<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mercedes Comand</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }
        
        /* Forziamo il corpo della pagina a ignorare i limiti di Safari */
        html, body {
            width: 100% !important;
            height: 100% !important;
            position: fixed;
            overflow: hidden;
            background-color: #000000;
        }

        /* Cornice totale bloccata ai bordi fisici dello schermo dell'iPhone */
        .cornice-comand {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            background: #070a12;
            border: 2px solid #f5a623;
        }

        /* Pannello Navigatore */
        .lato-mappa {
            width: 58%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #f5a623;
        }

        .titolo-sezione {
            color: #f5a623;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
            background: #070a12;
        }

        .contenitore-mappa {
            width: 100%;
            flex-grow: 1;
            background: #000;
        }

        iframe.mappa-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pannello Controlli Destro */
        .lato-musica {
            width: 42%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            position: relative;
            background: linear-gradient(145deg, #070a12, #111829);
        }

        .logo-mercedes {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #f5a623;
            font-size: 18px;
        }

        .pannello-audio {
            background: rgba(28, 43, 70, 0.6);
            border: 1px solid #f5a623;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }

        .btn-spotify {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 8px 18px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
        }

        .controlli-player {
            display: flex;
            justify-content: center;
            gap: 35px;
            font-size: 26px;
            color: #f5a623;
            margin-top: 10px;
        }

        .tasto-comand {
            background: linear-gradient(180deg, #1c2b46, #121e33);
            border: 1px solid #f5a623;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            padding: 8px 0;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            width: 110px;
            border-radius: 4px;
            margin: 2px 0;
        }

        .elenco-tasti {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="cornice-comand">
        
        <div class="lato-mappa">
            <div class="titolo-sezione">NAVIGAZIONE</div>
            <div class="contenitore-mappa">
                <iframe class="mappa-frame" id="mappa-realtime" src="https://www.openstreetmap.org/export/embed.html?bbox=9.15%2C45.43%2C9.25%2C45.50&layer=mapnik"></iframe>
            </div>
        </div>

        <div class="lato-musica">
            <div>
                <div class="titolo-sezione" style="padding-left:0;">MULTIMEDIA</div>
                <div class="logo-mercedes">★</div>
            </div>
            
            <div class="pannello-audio">
                <a href="spotify://" class="btn-spotify">APRI SPOTIFY</a>
                <div style="font-size: 11px; color: #a0a5b5; margin-top: 6px; font-family: monospace;">AUDIO ONLINE</div>
                <div class="controlli-player">
                    <span>⏮</span>
                    <span>⏸</span>
                    <span>⏭</span>
                </div>
            </div>

            <div class="elenco-tasti">
                <div class="tasto-comand">Bassi</div>
                <div class="tasto-comand">Alti</div>
                <div class="tasto-comand">Bil/Fad</div>
                <div class="tasto-comand">Indietro</div>
            </div>
        </div>

    </div>

    <script>
        // Forza lo scorrimento verso l'alto per nascondere i controlli Safari su iPhone
        window.addEventListener("load", function() {
            setTimeout(function() {
                window.scrollTo(0, 1);
            }, 0);
        });

        // Geolocalizzazione con mappa stradale dettagliata (OpenStreetMap ad alta precisione mobile)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lon = position.coords.longitude;
                
                // Calcoliamo un'area di visualizzazione stretta attorno all'iPhone (zoom da navigatore)
                var offset = 0.005; 
                var minLon = lon - offset;
                var maxLon = lon + offset;
                var minLat = lat - offset;
                var maxLat = lat + offset;
                
                document.getElementById('mappa-realtime').src = "https://www.openstreetmap.org/export/embed.html?bbox=" + minLon + "%2C" + minLat + "%2C" + maxLon + "%2C" + maxLat + "&layer=mapnik&marker=" + lat + "%2C" + lon;
            });
        }
    </script>
</body>
</html>
