<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercedes Comand Premium</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d121f; 
            background: linear-gradient(145deg, #070a12, #111829);
            color: #e6e6e6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            padding: 5px; 
            overflow: hidden;
        }

        .cornice-comand {
            display: flex;
            height: 100%;
            width: 100%;
            border: 2px solid #f5a623; 
            box-shadow: 0 0 15px rgba(245, 166, 35, 0.2); 
            border-radius: 8px;
            overflow: hidden;
        }

        .lato-mappa {
            flex: 1.2; /* Diamo leggermente più spazio alla mappa */
            border-right: 2px solid #f5a623; 
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .contenitore-mappa {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 40px);
        }

        iframe.mappa-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .lato-musica {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            position: relative;
            height: 100%;
            box-sizing: border-box;
        }

        .titolo-sezione {
            color: #f5a623; 
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 5px 0;
        }

        .logo-mercedes {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border: 2px solid #f5a623;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f5a623;
            font-size: 16px;
            font-weight: bold;
        }

        /* Pannello Audio Sostitutivo di Spotify per iPhone */
        .pannello-audio {
            background: rgba(28, 43, 70, 0.4);
            border: 1px solid rgba(245, 166, 35, 0.5);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            margin: 10px 0;
        }

        .btn-spotify {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .controlli-player {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 20px;
            color: #f5a623;
            margin-top: 5px;
        }

        .tasto-comand {
            background: linear-gradient(180deg, #1c2b46, #121e33);
            border: 1px solid #f5a623; 
            color: #ffffff;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            margin: 3px 0;
            text-align: center;
            width: 120px;
            border-radius: 4px;
        }

        .elenco-tasti {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
    </style>
</head>
<body>

    <div class="cornice-comand">
        
        <!-- LATO SINISTRO (MAPPA ADATTIVA) -->
        <div class="lato-mappa">
            <div style="padding: 10px 0 0 15px;" class="titolo-sezione">NAVIGAZIONE</div>
            <div class="contenitore-mappa">
                <iframe class="mappa-frame" src="https://www.openstreetmap.org/export/embed.html?bbox=7.0%2C43.0%2C14.0%2C47.0&amp;layer=mapnik"></iframe>
            </div>
        </div>

        <!-- LATO DESTRO (INTERFACCIA AUDIO + TASTI) -->
        <div class="lato-musica">
            <div>
                <div class="titolo-sezione">MULTIMEDIA</div>
                <div class="logo-mercedes">★</div>
            </div>
            
            <!-- CONTROLLO MULTIMEDIALE OTTIMIZZATO PER IPHONE -->
            <div class="pannello-audio">
                <a href="spotify://" class="btn-spotify">APRI SPOTIFY</a>
                <div style="font-size: 12px; color: #a0a5b5; margin-bottom: 10px;">Comand Audio Active</div>
                <div class="controlli-player">
                    <span>⏮</span>
                    <span>⏸</span>
                    <span>⏭</span>
                </div>
            </div>

            <!-- MENU TASTI IN ITALIANO -->
            <div class="elenco-tasti">
                <div class="tasto-comand">Bassi</div>
                <div class="tasto-comand">Alti</div>
                <div class="tasto-comand">Bil/Fad</div>
                <div class="tasto-comand">Indietro</div>
            </div>
        </div>

    </div>

</body>
</html>
