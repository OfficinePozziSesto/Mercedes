<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mercedes Comand DUB Blu System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            height: 100svh;
            background-color: #030710; /* Blu scuro quasi nero per la cornice */
            overflow: hidden;
            position: fixed;
            font-family: 'Courier New', monospace;
        }
        /* Cornice stile plancia Mercedes Comand APS (Era Blu/Bianco) */
        .comand-frame {
            display: flex;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            border: 3px solid #4a90e2; /* Blu luminoso Mercedes */
            background: linear-gradient(180deg, #071226 0%, #030815 100%); /* Sfondo display profondo */
            padding: 12px;
            box-sizing: border-box;
        }
        /* Schermo di Sinistra: Info e Canali */
        .screen-left {
            width: 65%;
            height: 100%;
            border-right: 2px dashed rgba(74, 144, 226, 0.4);
            padding-right: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header-system {
            display: flex;
            justify-content: space-between;
            color: #a4c6f4; /* Azzurro ghiaccio */
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid rgba(74, 144, 226, 0.5);
            padding-bottom: 5px;
            letter-spacing: 1px;
        }
        .display-frequenza {
            text-align: center;
            margin: 10px 0;
        }
        .ch-name {
            color: #ffffff; /* Bianco Latte brillante */
            font-size: 30px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(74, 144, 226, 0.4);
            letter-spacing: 3px;
        }
        .ch-genre {
            color: #4a90e2; /* Blu classico per i dettagli di sintonizzazione */
            font-size: 12px;
            margin-top: 6px;
            font-weight: bold;
        }
        /* Equalizzatore Grafico a barre Blu/Bianco */
        .eq-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            height: 45px;
            margin-bottom: 5px;
            background: rgba(74, 144, 226, 0.03);
            border-radius: 4px;
            padding: 5px;
        }
        .eq-bar {
            width: 14px;
            background: linear-gradient(0deg, #4a90e2 0%, #ffffff 100%); /* Sfumatura dal blu al bianco in cima */
            height: 10%;
            transition: height 0.12s ease;
            border-radius: 1px 1px 0 0;
        }
        /* Griglia dei Preset di selezione 1-6 */
        .station-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .btn-preset {
            background: linear-gradient(180deg, #0e1e38, #050b18);
            border: 1px solid #4a90e2;
            color: #ffffff;
            padding: 10px 0;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-preset.active {
            background: #ffffff;
            color: #071226;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
        }

        /* Schermo di Destra: Volume e tasti operativi */
        .screen-right {
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 15px;
        }
        .volume-display {
            background: rgba(74, 144, 226, 0.08);
            border: 1px solid #4a90e2;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .vol-label {
            color: #a4c6f4;
            font-size: 11px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .vol-bar-segments {
            display: flex;
            gap: 3px;
            justify-content: center;
        }
        .segment {
            width: 6px;
            height: 16px;
            background: #091326;
            border: 1px solid rgba(74, 144, 226, 0.2);
        }
        .segment.on {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }
        .audio-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-action {
            background: linear-gradient(180deg, #ffffff, #b5cce8);
            border: 1px solid #4a90e2;
            color: #071226;
            padding: 12px 0;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }
        .btn-action:active {
            background: #4a90e2;
            color: #ffffff;
        }
        .btn-audio-ctrl {
            background: #0e1e38;
            border: 1px solid #4a90e2;
            color: #a4c6f4;
            padding: 6px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-audio-ctrl:active {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="comand-frame">
        
        <div class="screen-left">
            <div class="header-system">
                <span>COMAND SYSTEM</span>
                <span>AUDIO: FM - DUB</span>
            </div>
            
            <div class="display-frequenza">
                <div id="station-title" class="ch-name">DUBWISE FM</div>
                <div id="station-details" class="ch-genre">CH-01: ROOTS REGGAE STREAM</div>
            </div>

            <div class="eq-container">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>

            <div class="station-grid">
                <div class="btn-preset active" onclick="changeStation(0)">[1] P1:ROOTS</div>
                <div class="btn-preset" onclick="changeStation(1)">[2] P2:GROSSE</div>
                <div class="btn-preset" onclick="changeStation(2)">[3] P3:DIGI</div>
                <div class="btn-preset" onclick="alert('Nessuna frequenza impostata')">[4] MEM-4</div>
                <div class="btn-preset" onclick="alert('Nessuna frequenza impostata')">[5] MEM-5</div>
                <div class="btn-preset" onclick="alert('Nessuna frequenza impostata')">[6] MEM-6</div>
            </div>
        </div>

        <div class="screen-right">
            <div class="volume-display">
                <div class="vol-label">COMAND VOLUME</div>
                <div class="vol-bar-segments" id="vol-bar">
                    </div>
                <div style="display:flex; gap: 6px; margin-top:10px;">
                    <div class="btn-audio-ctrl" style="flex:1" onclick="alterVolume(-1)">VOL -</div>
                    <div class="btn-audio-ctrl" style="flex:1" onclick="alterVolume(1)">VOL +</div>
                </div>
            </div>

            <div class="audio-actions">
                <div class="btn-action" id="play-btn" onclick="togglePlayback()">SYSTEM ON</div>
                <div class="btn-audio-ctrl" onclick="alert('Sound Mode: Heavy Bass Active')">SOUND INTERFACE</div>
            </div>
        </div>

    </div>

    <audio id="radio-player" style="display:none;" preload="none"></audio>

    <script>
        // Flussi streaming reali operativi e stabili per la musica Dub
        const stations = [
            { name: "DUBWISE FM", genre: "98.4 MHz - UK SOUNDSYSTEM LIVE", url: "https://hd.lagrosseradio.info:8000/lagrosseradio-reggae-192.mp3" },
            { name: "LA GROSSE", genre: "102.1 MHz - BOOM DUB REGGAE FR", url: "http://hd.lagrosseradio.info:8000/lagrosseradio-reggae-192.mp3" },
            { name: "DIGITAL DUB", genre: "89.9 MHz - DEEP ELECTRONIC DUB", url: "https://stream.klassikradio.de/dreams/mp3-192/www.klassikradio.de/" }
        ];

        let currentStationIdx = 0;
        const player = document.getElementById('radio-player');
        let currentVolume = 7; // Scala fino a 12

        function drawVolume() {
            const container = document.getElementById('vol-bar');
            container.innerHTML = '';
            for(let i=1; i<=12; i++) {
                let seg = document.createElement('div');
                seg.className = 'segment' + (i <= currentVolume ? ' on' : '');
                container.appendChild(seg);
            }
            player.volume = currentVolume / 12;
        }

        function changeStation(idx) {
            currentStationIdx = idx;
            const presets = document.querySelectorAll('.btn-preset');
            presets.forEach((btn, i) => {
                if(i === idx) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            document.getElementById('station-title').innerText = stations[idx].name;
            document.getElementById('station-details').innerText = stations[idx].genre;

            const wasPlaying = !player.paused;
            player.src = stations[idx].url;
            if (wasPlaying) {
                player.play().catch(e => console.log("Premere SYSTEM ON"));
            }
        }

        function togglePlayback() {
            const btn = document.getElementById('play-btn');
            if (!player.src) {
                player.src = stations[currentStationIdx].url;
            }
            
            if (player.paused) {
                player.play();
                btn.innerText = "SYSTEM OFF";
                btn.style.background = "linear-gradient(180deg, #4a90e2, #0e1e38)";
                btn.style.color = "#ffffff";
                btn.style.borderColor = "#ffffff";
                startEqualizer();
            } else {
                player.pause();
                btn.innerText = "SYSTEM ON";
                btn.style.background = "linear-gradient(180deg, #ffffff, #b5cce8)";
                btn.style.color = "#071226";
                btn.style.borderColor = "#4a90e2";
                stopEqualizer();
            }
        }

        function alterVolume(change) {
            currentVolume += change;
            if(currentVolume < 0) currentVolume = 0;
            if(currentVolume > 12) currentVolume = 12;
            drawVolume();
        }

        let eqInterval = null;
        function startEqualizer() {
            const bars = document.querySelectorAll('.eq-bar');
            eqInterval = setInterval(() => {
                bars.forEach(bar => {
                    let randomHeight = Math.floor(Math.random() * 85) + 15;
                    bar.style.height = randomHeight + '%';
                });
            }, 130);
        }

        function stopEqualizer() {
            clearInterval(eqInterval);
            const bars = document.querySelectorAll('.eq-bar');
            bars.forEach(bar => bar.style.height = '10%');
        }

        drawVolume();
    </script>
</body>
</html>
