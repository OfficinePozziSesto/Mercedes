<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Comand Mercedes Benz Dub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            height: 100svh;
            background-color: #020612;
            overflow: hidden;
            position: fixed;
            font-family: 'Courier New', monospace;
        }
        
        .comand-frame {
            display: flex;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            border: 3px solid #4a90e2;
            padding: 12px;
            box-sizing: border-box;
            position: relative;
            background-color: #040a18;
        }

        /* STRATO SFONDO: Scala di sintonizzazione analogica anni 80 in bianco e nero disegnata in codice */
        .tuner-back-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15; /* Sfumata sul fondo */
            background-image: 
                /* Linee orizzontali della scala FM/AM */
                linear-gradient(transparent 48%, #ffffff 49%, #ffffff 51%, transparent 52%),
                linear-gradient(transparent 58%, #ffffff 59%, #ffffff 61%, transparent 62%),
                /* Tacche verticali delle frequenze della radio */
                linear-gradient(90deg, #ffffff 2px, transparent 2px);
            background-size: 100% 100%, 100% 100%, 5% 15px;
            background-position: 0 0, 0 0, center 52%;
            background-repeat: no-repeat, no-repeat, repeat-x;
        }

        /* Griglia blu originale del Comand sopra lo sintonizzatore */
        .comand-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(74, 144, 226, 0.09) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 144, 226, 0.09) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            pointer-events: none;
        }

        .screen-left, .screen-right {
            position: relative;
            z-index: 2;
        }

        .screen-left {
            width: 65%;
            height: 100%;
            border-right: 2px dashed rgba(74, 144, 226, 0.4);
            padding-right: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .header-system {
            display: flex;
            justify-content: space-between;
            color: #a4c6f4;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 1px solid rgba(74, 144, 226, 0.5);
            padding-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .display-frequenza {
            text-align: center;
            margin: 5px 0;
            background: rgba(4, 10, 24, 0.75);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(74, 144, 226, 0.3);
        }
        .ch-name {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(74, 144, 226, 0.4);
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
        }
        .ch-genre {
            color: #4a90e2;
            font-size: 11px;
            margin-top: 4px;
            font-weight: bold;
        }
        .eq-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            height: 40px;
            margin-bottom: 5px;
            background: rgba(74, 144, 226, 0.15);
            border-radius: 4px;
            padding: 5px;
            border: 1px solid rgba(74, 144, 226, 0.3);
        }
        .eq-bar {
            width: 14px;
            background: linear-gradient(0deg, #4a90e2 0%, #ffffff 100%);
            height: 10%;
            transition: height 0.12s ease;
            border-radius: 1px 1px 0 0;
        }
        .station-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .btn-preset {
            background: linear-gradient(180deg, #0e1e38, #050b18);
            border: 1px solid #4a90e2;
            color: #ffffff;
            padding: 8px 0;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-preset.active {
            background: #ffffff;
            color: #071226;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
        }
        .screen-right {
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 15px;
        }
        .volume-display {
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid #4a90e2;
            border-radius: 4px;
            padding: 10px;
            text-align: center;
        }
        .vol-label {
            color: #a4c6f4;
            font-size: 11px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .vol-bar-segments {
            display: flex;
            gap: 3px;
            justify-content: center;
        }
        .segment {
            width: 6px;
            height: 16px;
            background: #091326;
            border: 1px solid rgba(74, 144, 226, 0.3);
        }
        .segment.on {
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }
        .audio-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-action {
            background: linear-gradient(180deg, #ffffff, #b5cce8);
            border: 1px solid #4a90e2;
            color: #071226;
            padding: 12px 0;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-audio-ctrl {
            background: #0e1e38;
            border: 1px solid #4a90e2;
            color: #a4c6f4;
            padding: 6px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="comand-frame">
        <div class="tuner-back-layer"></div>

        <div class="screen-left">
            <div class="header-system">
                <span>comand Mercedes Benz Dub</span>
                <span>AUDIO: TUNER-DUB</span>
            </div>
            
            <div class="display-frequenza">
                <div id="station-title" class="ch-name">RADIO TUNER</div>
                <div id="station-details" class="ch-genre">SELECT PRESET...</div>
            </div>

            <div class="eq-container">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>

            <div class="station-grid">
                <div class="btn-preset active" onclick="changeStation(0)">[1] 100% RADIO 80s</div>
                <div class="btn-preset" onclick="changeStation(1)">[2] JAZZ INTER.</div>
                <div class="btn-preset" onclick="changeStation(2)">[3] JAZZ CAFE</div>
                <div class="btn-preset" onclick="changeStation(3)">[4] DISCO 80 HITS</div>
                <div class="btn-preset" onclick="changeStation(4)">[5] CLASSIC ROCK 80</div>
                <div class="btn-preset" onclick="changeStation(5)">[6] ABSOLUTE 80s</div>
            </div>
        </div>

        <div class="screen-right">
            <div class="volume-display">
                <div class="vol-label">VOLUME</div>
                <div class="vol-bar-segments" id="vol-bar"></div>
                <div style="display:flex; gap: 6px; margin-top:10px;">
                    <div class="btn-audio-ctrl" style="flex:1" onclick="alterVolume(-1)">VOL -</div>
                    <div class="btn-audio-ctrl" style="flex:1" onclick="alterVolume(1)">VOL +</div>
                </div>
            </div>

            <div class="audio-actions">
                <div class="btn-action" id="play-btn" onclick="togglePlayback()">SYSTEM ON</div>
                <div class="btn-audio-ctrl" onclick="alert('Bass Boost Active')">SOUND INTERFACE</div>
            </div>
        </div>
    </div>

    <audio id="radio-player" preload="none"></audio>

    <script>
        // FLUSSI AUDIO AGGIORNATI: Tutti MP3 puri e diretti compatibili al 100% con iOS
        const stations = [
            { name: "100% RADIO 80s", genre: "88.5 MHz - BEST OF EIGHTIES HITS", url: "https://100radio-80.ice.infomaniak.ch/100radio-80-128.mp3" },
            { name: "JAZZ INTERNATIONAL", genre: "88.7 MHz - PARIS SWING & CHILL", url: "https://jazzradio.ice.infomaniak.ch/jazzradio-high.mp3" },
            { name: "JAZZ CAFE RADIO", genre: "94.1 MHz - LOUNGE & SMOOTH BEATS", url: "https://jazzcafe.ice.infomaniak.ch/jazzcafe-high.mp3" },
            { name: "DISCO 80 HITS", genre: "91.3 MHz - PURE 80s DISCO FEVER", url: "https://80s.ice.infomaniak.ch/80s-high.mp3" },
            { name: "CLASSIC ROCK 80", genre: "101.8 MHz - GREAT ROCK ANTHEMS", url: "https://classicrock.ice.infomaniak.ch/classicrock-high.mp3" },
            { name: "ABSOLUTE 80s", genre: "105.4 MHz - NON-STOP 80s CLASSICS", url: "http://stream.live.vc.bbcmedia.co.uk/bbc_radio_two" }
        ];

        let currentStationIdx = 0;
        const player = document.getElementById('radio-player');
        let currentVolume = 8;
        let eqInterval = null;

        function drawVolume() {
            const container = document.getElementById('vol-bar');
            container.innerHTML = '';
            for(let i=1; i<=12; i++) {
                let seg = document.createElement('div');
                seg.className = 'segment' + (i <= currentVolume ? ' on' : '');
                container.appendChild(seg);
            }
            player.volume = currentVolume / 12;
        }

        function changeStation(idx) {
            currentStationIdx = idx;
            const presets = document.querySelectorAll('.btn-preset');
            presets.forEach((btn, i) => {
                if(i === idx) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            document.getElementById('station-title').innerText = stations[idx].name;
            document.getElementById('station-details').innerText = stations[idx].genre;

            const wasPlaying = !player.paused;
            player.pause();
            player.src = stations[idx].url;
            player.load(); 
            
            if (wasPlaying) {
                setTimeout(function() {
                    player.play().catch(function(e) { console.log("Bypass"); });
                }, 250);
            }
        }

        function togglePlayback() {
            const btn = document.getElementById('play-btn');
            
            if (!player.src || player.src === "") {
                player.src = stations[currentStationIdx].url;
                player.load();
            }
            
            if (player.paused) {
                startEqualizer();
                btn.innerText = "SYSTEM OFF";
                btn.style.background = "linear-gradient(180deg, #4a90e2, #0e1e38)";
                btn.style.color = "#ffffff";
                
                player.play().catch(function(err) {
                    console.log("iOS Handled");
                });
            } else {
                player.pause();
                stopEqualizer();
                btn.innerText = "SYSTEM ON";
                btn.style.background = "linear-gradient(180deg, #ffffff, #b5cce8)";
                btn.style.color = "#071226";
            }
        }

        function alterVolume(change) {
            currentVolume += change;
            if(currentVolume < 0) currentVolume = 0;
            if(currentVolume > 12) currentVolume = 12;
            drawVolume();
        }

        function startEqualizer() {
            const bars = document.querySelectorAll('.eq-bar');
            if(eqInterval) clearInterval(eqInterval);
            eqInterval = setInterval(function() {
                bars.forEach(function(bar) {
                    let randomHeight = Math.floor(Math.random() * 85) + 15;
                    bar.style.height = randomHeight + '%';
                });
            }, 130);
        }

        function stopEqualizer() {
            if(eqInterval) clearInterval(eqInterval);
            const bars = document.querySelectorAll('.eq-bar');
            bars.forEach(function(bar) { bar.style.height = '10%'; });
        }

        document.getElementById('station-title').innerText = stations[0].name;
        document.getElementById('station-details').innerText = stations[0].genre;
        drawVolume();
    </script>
</body>
</html>
