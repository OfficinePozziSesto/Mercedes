<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mercedes Comand Premium</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #070a12;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cornice-comand {
            display: flex;
            width: 100vw;
            height: 100vh;
            border: 1px solid #f5a623;
            background: #070a12;
        }
        .lato-mappa {
            width: 55%;
            height: 100%;
            border-right: 1px solid #f5a623;
            display: flex;
            flex-direction: column;
        }
        .titolo-sezione {
            color: #f5a623;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 0 4px 12px;
            background-color: #070a12;
        }
        .contenitore-mappa {
            width: 100%;
            height: 100%;
            background: #000;
        }
        iframe.mappa-frame {
            width: 100%;
            height: 100%;
            border: 0;
            margin: 0;
            padding: 0;
        }
        .lato-musica {
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            position: relative;
        }
        .logo-mercedes {
            position: absolute;
            top: 8px;
            right: 12px;
            color: #f5a623;
            font-size: 16px;
        }
        .pannello-audio {
            background: rgba(28, 43, 70, 0.5);
            border: 1px solid #f5a623;
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            margin-top: 5px;
        }
        .btn-spotify {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .controlli-player {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 24px;
            color: #f5a623;
            margin-top: 8px;
        }
        .icona-tasto {
            cursor: pointer;
        }
        .tasto-comand {
            background: linear-gradient(180deg, #1c2b46, #121e33);
            border: 1px solid #f5a623;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            padding: 6px 0;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            width: 100px;
            border-radius: 3px;
            margin: 2px 0;
        }
        .elenco-tasti {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="cornice-comand">
        
        <div class="lato-mappa">
            <div class="titolo-sezione">NAVIGAZIONE</div>
            <div class="contenitore-mappa">
                <iframe class="mappa-frame" id="mappa-realtime" src="https://maps.google.com/maps?q=Milano&t=&z=14&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>
        </div>

        <div class="lato-musica">
            <div>
                <div class="titolo-sezione" style="padding-left:0;">MULTIMEDIA</div>
                <div class="logo-mercedes">★</div>
            </div>
            
            <div class="pannello-audio">
                <a href="spotify://" class="btn-spotify">APRI SPOTIFY</a>
                <div style="font-size: 11px; color: #a0a5b5; margin-top: 5px; font-family: monospace;">SYSTEM CONNECTED</div>
                <div class="controlli-player">
                    <span class="icona-tasto">⏮</span>
                    <span class="icona-tasto">⏸</span>
                    <span class="icona-tasto">⏭</span>
                </div>
            </div>

            <div class="elenco-tasti">
                <div class="tasto-comand">Bassi</div>
                <div class="tasto-comand">Alti</div>
                <div class="tasto-comand">Bil/Fad</div>
                <div class="tasto-comand">Indietro</div>
            </div>
        </div>

    </div>

    <script>
        // Rilevamento GPS per centrare la mappa sulla tua posizione esatta in auto
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lon = position.coords.longitude;
                document.getElementById('mappa-realtime').src = "https://maps.google.com/maps?q=" + lat + "," + lon + "&t=&z=15&ie=UTF8&iwloc=&output=embed";
            });
        }
    </script>
</body>
</html>
